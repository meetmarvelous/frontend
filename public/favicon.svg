<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#E07045"/>
  <!-- Abstract A mark: two diagonal strokes forming an A with a node dot -->
  <line x1="7" y1="26" x2="16" y2="7" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="25" y1="26" x2="16" y2="7" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="10.5" y1="19" x2="21.5" y2="19" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Node dot at apex -->
  <circle cx="16" cy="7" r="2" fill="white"/>
</svg>
